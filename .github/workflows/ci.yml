name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, dependency-free checks: formatting, lints, and a release build.
  check:
    name: fmt · clippy · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Reuses the flake's pinned toolchain (rust-toolchain.toml) so CI and
      # local dev compile with the exact same rustc.
      - run: nix develop --command cargo fmt --all -- --check
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - run: nix develop --command cargo build --release --workspace

  # Unit tests plus the end-to-end test. The devShell provides bitcoind (via
  # BITCOIND_EXE) and nak (for `nak serve`), which the e2e test needs.
  test:
    name: test (unit + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run tests
        run: nix develop --command cargo test --workspace -- --test-threads=1
